<!doctype html>
<html lang="en">
  <head>
    <title>Paulo Silva | Frontend Developer</title>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO: Description used by search engines like Google -->
    <!-- SEO -->
    <meta
      name="description"
      content="Frontend developer portfolio featuring projects, experiments, and UI engineering work."
    />

    <!-- OPEN GRAPH: Controls how the site appears when shared on social platforms (WhatsApp, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Paulo Silva | Product Designer & Frontend Developer"
    />
    <meta
      property="og:description"
      content="Frontend developer portfolio featuring projects, experiments, and UI engineering work."
    />
    <meta property="og:url" content="https://www.paulos.dev/" />
    <!-- Canonical URL: Tells search engines the official version of this page -->
    <link rel="canonical" href="https://www.paulos.dev/" />

    <!-- OG Image: Preview image shown when the site is shared -->
    <!-- Image -->
    <meta
      property="og:image"
      content="https://www.paulos.dev/images/og/home.jpg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Paul Silva portfolio preview" />

    <!--  -->
    <meta property="og:site_name" content="Paulo Silva" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter (X): Specific tags for Twitter sharing previews -->
    <!-- Twitter (X) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Paul Silva | Product Designer & Frontend Developer"
    />
    <meta
      name="twitter:description"
      content="Frontend developer portfolio featuring projects, experiments, and UI engineering work."
    />
    <meta
      name="twitter:image"
      content="https://www.paulos.dev/images/og/home.jpg"
    />

    <link rel="stylesheet" href="/src/css/styles.css" />
    <script type="module" src="/src/js/main.js" defer></script>
  </head>
  <body>
    <div class="line-break-4 container">
      <header>
        <nav>
          <ul>
            <li>
              <a href="#projects">Projects</a>
              <a href="#contacts">Contacts</a>
            </li>
          </ul>
        </nav>
      </header>
      <!-- Navigation -->

      <!-- Title + Image -->
      <section class="introduction__title-img-wrapper">
        <div class="introduction__description">
          <p class="introduction__name">Hey, I'm Paulo Silva.</p>
          <h1 class="introduction__role">
            <span class="introduction__role--blue">Front</span>end
          </h1>
          <h1 class="introduction__role">Developer</h1>
          <p>I craft beautiful and performant web experiences.</p>
        </div>
        <img
          src="/images/me.png"
          alt="Photo of myself"
          class="introduction__profile__img"
        />
      </section>

      <!-- SVG Animation -->
      <section>
        <wc-skills-svg></wc-skills-svg>
      </section>

      <!-- Cards -->
      <section class="line-break" id="projects">
        <h2>Projects</h2>
        <div class="card__wrapper">
          <wc-card
            img="/images/projects/dbec.png"
            label="Daily Basis English Course"
            link="https://www.dbec.com.br"
            description="Project for my private students"
          ></wc-card>
          <wc-card
            img="/images/projects/cyber-wheel.png"
            label="Cyber Wheel Bicycle Shop"
            link="https://cyberwheel-js.vercel.app/"
            description="A fake futuristic bicycle shop"
          ></wc-card>
          <wc-card
            img="/images/projects/my-dev-lab.png"
            label="Full-stack Lab"
            link="https://my-dev-lab.vercel.app/"
            description="A bit of snippets of everything"
          ></wc-card>
          <!-- <wc-card
            label="Altered Gravity"
            link="https://alteredgravity.vercel.app/"
            description=""
          ></wc-card> -->
          <!-- <wc-card
            label="Out Run"
            link="#"
            description="Out Run is 1986 racing video game developed and published by Sega for arcades."
          ></wc-card> -->
        </div>
      </section>

      <section class="line-break" id="contacts">
        <h2>Contacts</h2>
        <div class="icon__wrapper">
          <a
            href="https://github.com/paulofernando78"
            class="presenttion__icon"
          >
            <img
              src="/images/icons/github.svg"
              alt="Github icon"
              class="img__filter"
            />
          </a>
          <a href="https://www.linkedin.com/in/paulo-fernando-70930725/">
            <img src="/images/icons/linkedin.svg" alt="Github icon" />
          </a>
        </div>
      </section>
    </div>
  </body>
</html>
